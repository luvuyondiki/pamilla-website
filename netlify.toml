[build]
  command = "npm install"
  publish = "."

[[redirects]]
  from = "/opportunities"
  to = "/opportunities.html"
  status = 200

[[redirects]]
  from = "/travel"
  to = "/opportunities.html"
  status = 301

[[redirects]]
  from = "/recruitment"
  to = "/opportunities.html"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"
